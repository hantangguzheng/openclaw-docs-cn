<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - OpenClaw 中文站</title>
  <meta name="description" content="登录 OpenClaw 中文站，获取更多个性化功能和社区互动。">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <style>
    .auth-container{max-width:440px;margin:100px auto;padding:0 24px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .auth-card h1{font-size:24px;font-weight:700;margin-bottom:8px;text-align:center}
    .auth-card .subtitle{color:var(--text-secondary);font-size:14px;text-align:center;margin-bottom:32px}
    .auth-tabs{display:flex;gap:4px;background:var(--bg-dark);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px}
    .auth-tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;border-radius:6px;transition:all 0.2s}
    .auth-tab.active{background:var(--primary);color:#fff}
    .auth-form{display:none}
    .auth-form.active{display:block}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-weight:600;margin-bottom:8px;font-size:14px;color:var(--text-primary)}
    .form-group input{width:100%;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text-primary);font-size:15px;font-family:inherit;transition:border-color 0.2s;appearance:none}
    .form-group input:focus{outline:none;border-color:var(--primary)}
    .form-group input.error{border-color:#ef4444}
    .form-group .error-msg{color:#ef4444;font-size:12px;margin-top:4px}
    .auth-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px}
    .auth-btn:hover{background:var(--primary-dark)}
    .auth-btn:disabled{opacity:0.6;cursor:not-allowed}
    .auth-divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--text-muted);font-size:13px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--bg-dark);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:14px;cursor:pointer;transition:all 0.2s}
    .social-btn:hover{border-color:var(--primary)}
    .forgot-link{display:block;text-align:center;margin-top:16px;color:var(--text-muted);font-size:13px;text-decoration:none}
    .forgot-link:hover{color:var(--primary)}
    .alert{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:16px;display:none}
    .alert.show{display:block}
    .alert.success{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3);color:var(--accent-green)}
    .loading{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="logo-icon">🦞</span><span class="logo-text">OpenClaw</span></a>
    <ul class="nav-links">
      <li><a href="index.html">返回首页</a></li>
    </ul>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1>🦞 OpenClaw</h1>
    <p class="subtitle">登录以访问社区功能和个性化设置</p>

    <div id="alert-box" class="alert"></div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>📧 邮箱</label>
        <input type="email" id="login-email" placeholder="your@email.com" required>
        <div class="error-msg" id="login-email-err"></div>
      </div>
      <div class="form-group">
        <label>🔒 密码</label>
        <input type="password" id="login-password" placeholder="输入密码" required>
        <div class="error-msg" id="login-password-err"></div>
      </div>
      <button type="submit" class="auth-btn" id="login-btn">登录</button>
      <a href="#" class="forgot-link">忘记密码？</a>
    </form>

    <!-- 注册表单 -->
    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>👤 用户名</label>
        <input type="text" id="reg-username" placeholder="选择用户名" required>
        <div class="error-msg" id="reg-username-err"></div>
      </div>
      <div class="form-group">
        <label>📧 邮箱</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required>
        <div class="error-msg" id="reg-email-err"></div>
      </div>
      <div class="form-group">
        <label>🔒 密码</label>
        <input type="password" id="reg-password" placeholder="至少 6 位" required minlength="6">
        <div class="error-msg" id="reg-password-err"></div>
      </div>
      <div class="form-group">
        <label>🔐 确认密码</label>
        <input type="password" id="reg-confirm" placeholder="再次输入密码" required>
        <div class="error-msg" id="reg-confirm-err"></div>
      </div>
      <button type="submit" class="auth-btn" id="reg-btn">注册</button>
    </form>

    <div class="auth-divider">或</div>

    <button class="social-btn" onclick="alert('GitHub 登录即将上线')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      使用 GitHub 登录
    </button>
  </div>
</div>

<script>
// YQCQ API 配置
const YQCQ_API = 'http://www.yiqicuqu.com/api/v1';

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if (tab === 'login') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('register-form').classList.add('active');
  }
  clearAlert();
}

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alert-box');
  box.textContent = msg;
  box.className = 'alert show' + (type === 'success' ? ' success' : '');
}

function clearAlert() {
  const box = document.getElementById('alert-box');
  box.className = 'alert';
  box.textContent = '';
  // Clear errors
  document.querySelectorAll('.error-msg').forEach(e => e.textContent = '');
  document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
}

function setFieldError(id, msg) {
  const errEl = document.getElementById(id + '-err');
  const inputEl = document.getElementById(id);
  if (errEl) errEl.textContent = msg;
  if (inputEl) inputEl.classList.add('error');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '⏳ 处理中...';
  } else {
    btn.disabled = false;
    btn.textContent = btnId === 'login-btn' ? '登录' : '注册';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  clearAlert();

  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email) return setFieldError('login-email', '请输入邮箱');
  if (!password) return setFieldError('login-password', '请输入密码');

  setLoading('login-btn', true);

  try {
    const resp = await fetch(`${YQCQ_API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.message || data.error || '登录失败');
    }

    // 保存 token
    localStorage.setItem('yqcq_token', data.token || data.access_token);
    localStorage.setItem('yqcq_user', JSON.stringify(data.user || {}));

    showAlert('✅ 登录成功！正在跳转...', 'success');

    setTimeout(() => {
      // 触发登录成功回调
      window.opener && window.opener.postMessage && window.opener.postMessage('yqcq-login-success', '*');
      // 如果有 opener 窗口则关闭弹窗
      if (window.opener) {
        window.close();
      } else {
        location.href = 'index.html';
      }
    }, 1000);
  } catch (err) {
    showAlert('❌ ' + err.message);
  } finally {
    setLoading('login-btn', false);
  }
}

async function handleRegister(e) {
  e.preventDefault();
  clearAlert();

  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (!username) return setFieldError('reg-username', '请输入用户名');
  if (!email) return setFieldError('reg-email', '请输入邮箱');
  if (!password || password.length < 6) return setFieldError('reg-password', '密码至少 6 位');
  if (password !== confirm) return setFieldError('reg-confirm', '两次密码不一致');

  setLoading('reg-btn', true);

  try {
    const resp = await fetch(`${YQCQ_API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.message || data.error || '注册失败');
    }

    showAlert('✅ 注册成功！请登录', 'success');
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    showAlert('❌ ' + err.message);
  } finally {
    setLoading('reg-btn', false);
  }
}

// 检查是否已登录
(function checkAuth() {
  const token = localStorage.getItem('yqcq_token');
  if (token) {
    // 已登录，显示用户名
    const user = JSON.parse(localStorage.getItem('yqcq_user') || '{}');
    const userEl = document.querySelector('.auth-card h1');
    if (userEl && user.username) {
      userEl.textContent = '👋 ' + user.username;
    }
  }
})();
</script>

</body>
</html>
